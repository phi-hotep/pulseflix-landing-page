# Feature List                            Edit, add or remove features to be presented.
features                                  :

  - title                                 : Trending Today
    description                           : Stay on top of what's hot. Browse movies trending today, this week, or all-time popular — updated daily.
    fontawesome_icon_name                 : fire

  - title                                 : Watch Trailers
    description                           : Watch high-quality trailers directly in the app. Auto or HD quality, with autoplay and mute options you control.
    fontawesome_icon_name                 : play-circle

  - title                                 : My List
    description                           : Save trailers you love to your personal list and come back to them anytime, all in one place.
    fontawesome_icon_name                 : heart

  - title                                 : Where to Watch
    description                           : Find out exactly where to stream or rent each movie — powered by JustWatch data.
    fontawesome_icon_name                 : tv

  - title                                 : Discover More
    description                           : Get smart recommendations based on what you're watching. Always something new to explore.
    fontawesome_icon_name                 : compass

  - title                                 : Dark & Light Mode
    description                           : Looks great in both dark and light mode. Follows your system settings automatically, or set it manually.
    fontawesome_icon_name                 : adjust

  - title                                 : Multi-language Support
    description                           : Available in English and French, with more languages on the way.
    fontawesome_icon_name                 : globe

  - title                                 : Share with Friends
    description                           : Love a trailer? Share PulseFlix with friends and let them discover great movies too.
    fontawesome_icon_name                 : share-alt



