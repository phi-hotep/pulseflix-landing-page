<svg xmlns="http://www.w3.org/2000/svg"
    viewBox="0 0 200 60"
    width="200"
    height="60">
    <!-- Background -->
    <rect width="200"
        height="60"
        rx="10"
        ry="10"
        fill="#000"/>
    <!-- Border -->
    <rect x="0.75"
        y="0.75"
        width="198.5"
        height="58.5"
        rx="9.5"
        ry="9.5"
        fill="none"
        stroke="#a6a6a6"
        stroke-width="1"/>
    <!-- Globe icon -->
    <g transform="translate(30, 30)">
        <circle cx="0"
            cy="0"
            r="13"
            fill="none"
            stroke="white"
            stroke-width="1.5"/>
        <ellipse cx="0"
            cy="0"
            rx="5.5"
            ry="13"
            fill="none"
            stroke="white"
            stroke-width="1.5"/>
        <line x1="-13"
            y1="0"
            x2="13"
            y2="0"
            stroke="white"
            stroke-width="1.5"/>
        <line x1="-10.5"
            y1="-6.5"
            x2="10.5"
            y2="-6.5"
            stroke="white"
            stroke-width="1.2"/>
        <line x1="-10.5"
            y1="6.5"
            x2="10.5"
            y2="6.5"
            stroke="white"
            stroke-width="1.2"/>
    </g>
    <!-- "Available on" small text -->
    <text x="53"
        y="24"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', Arial, sans-serif"
        font-size="11"
        fill="white"
        letter-spacing="0.3">Available on</text>
    <!-- "Web" large text -->
    <text x="52"
        y="47"
        font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="23"
        font-weight="600"
        fill="white"
        letter-spacing="0.2">Web</text>
</svg>
